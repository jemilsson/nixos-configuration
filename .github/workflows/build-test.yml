name: Build Test - All Machines

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: [self-hosted, nixos]
    outputs:
      machines: ${{ steps.get-machines.outputs.machines }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Check flake
      run: |
        nix --extra-experimental-features 'nix-command flakes' flake check --no-build
      env:
        NIX_CONFIG: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org/
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
    
    - name: Get machine list
      id: get-machines
      run: |
        machines=$(nix --extra-experimental-features 'nix-command flakes' eval --json '.#nixosConfigurations' --apply 'builtins.attrNames')
        echo "machines=$machines" >> $GITHUB_OUTPUT
        echo "Found machines: $machines"

  build:
    needs: check
    runs-on: [self-hosted, nixos]
    strategy:
      matrix:
        machine: ${{ fromJson(needs.check.outputs.machines) }}
      fail-fast: false
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build ${{ matrix.machine }}
      run: |
        nix --extra-experimental-features 'nix-command flakes' build \
          '.#nixosConfigurations.${{ matrix.machine }}.config.system.build.toplevel' \
          --no-link \
          --print-build-logs
      env:
        NIX_CONFIG: |
          experimental-features = nix-command flakes
          substituters = https://cache.nixos.org/
          trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=